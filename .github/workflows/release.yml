name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build release binaries
        run: make build-all

      - name: Generate checksums
        run: |
          cd dist
          sha256sum softlayer-* > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/softlayer-linux-amd64
            dist/softlayer-linux-arm64
            dist/softlayer-darwin-amd64
            dist/softlayer-darwin-arm64
            dist/checksums.txt
